<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pig Bang</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; cursor: crosshair; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
    font-family: 'Courier New', monospace; color: #fff; z-index: 10;
  }
  #score {
    position: absolute; top: 20px; left: 20px;
    font-size: 28px; font-weight: bold;
    text-shadow: 2px 2px 4px #000;
  }
  #lives {
    position: absolute; top: 52px; left: 20px;
    font-size: 24px;
    text-shadow: 2px 2px 4px #000;
  }
  #wave {
    position: absolute; top: 20px; right: 20px;
    font-size: 22px; font-weight: bold;
    text-shadow: 2px 2px 4px #000;
  }
  #weapon-display {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    text-align: center;
  }
  #weapon-name {
    font-size: 20px; font-weight: bold; letter-spacing: 2px;
    text-shadow: 2px 2px 4px #000;
  }
  #weapon-desc {
    font-size: 12px; opacity: 0.7; margin-top: 2px;
    text-shadow: 1px 1px 2px #000;
  }
  #health-container {
    position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
    z-index: 50;
  }
  #health-label {
    text-align: center; margin-bottom: 4px;
    font-size: 14px; font-weight: bold; letter-spacing: 2px;
    text-shadow: 1px 1px 3px #000; color: #fff;
  }
  #health-bar {
    position: relative;
    width: 300px; height: 28px; background: #111; border: 3px solid #fff;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.9);
  }
  #health-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    width: 100%; background: #4e4;
    transition: width 0.15s, background 0.2s;
    border-radius: 11px;
  }
  #health-segments {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; pointer-events: none;
  }
  .health-segment {
    flex: 1; height: 100%; border-right: 2px solid rgba(255,255,255,0.3);
  }
  .health-segment:last-child { border-right: none; }
  .health-segment.bonus { border-left: 3px solid #ff0; }
  #boss-bar-container {
    position: absolute; top: 105px; left: 50%; transform: translateX(-50%);
    text-align: center; width: 400px;
  }
  #boss-name {
    font-size: 16px; font-weight: bold; color: #f44; letter-spacing: 3px;
    text-shadow: 2px 2px 4px #000; margin-bottom: 4px;
  }
  #boss-bar {
    width: 100%; height: 20px; background: #222; border: 2px solid #f44;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 20px rgba(255,0,0,0.3);
  }
  #boss-fill {
    width: 100%; height: 100%; background: #e44; transition: width 0.15s;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  #damage-flash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
    pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.1s;
  }
  #game-over {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 20;
    flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; color: #fff;
  }
  #game-over h1 { font-size: 64px; color: #e44; margin-bottom: 10px; }
  #game-over .final-score { font-size: 32px; margin-bottom: 30px; }
  #game-over .restart {
    font-size: 24px; color: #ff0; animation: blink 1s infinite;
    pointer-events: auto; cursor: pointer;
  }
  @keyframes blink { 50% { opacity: 0.5; } }
  #wave-announce {
    display: none; position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Courier New', monospace; font-weight: bold;
    text-shadow: 3px 3px 6px #000; z-index: 15; pointer-events: none;
    text-align: center;
  }
  #wave-announce .wave-num { font-size: 52px; color: #ff0; }
  #wave-announce .weapon-unlock {
    font-size: 28px; margin-top: 8px;
    animation: popIn 0.3s ease-out;
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #dev-panel {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 100;
  }
  #dev-panel select {
    background: rgba(0,0,0,0.7); color: #0f0; border: 1px solid #0f0;
    padding: 5px 10px; border-radius: 4px; font-family: 'Courier New', monospace;
    font-size: 12px; cursor: pointer; pointer-events: auto;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="lives"></div>
  <div id="wave">Wave 1</div>
  <div id="weapon-display">
    <div id="weapon-name">SHOTGUN</div>
    <div id="weapon-desc">Spread shot - classic recoil</div>
  </div>
  <div id="boss-bar-container" style="display:none;">
    <div id="boss-name">BOSS</div>
    <div id="boss-bar"><div id="boss-fill"></div></div>
  </div>
</div>
<div id="dev-panel">
  <select id="level-select" onchange="devSelectAction(this.value)">
    <option value="" disabled selected>DEV: Go to wave...</option>
    <option value="cinematic">Play cinematic (barn→forest)</option>
    <option value="1">Wave 1 - SHOTGUN</option>
    <option value="2">Wave 2 - BAZOOKA</option>
    <option value="3">Wave 3 - RICOCHET PISTOL</option>
    <option value="4">Wave 4 - RAIL GUN</option>
    <option value="5">Wave 5 - GRENADE (BOSS)</option>
    <option value="6">Wave 6 - BLUNDERBUSS [Forest]</option>
    <option value="7">Wave 7 - DYNAMITE [Forest]</option>
    <option value="8">Wave 8 - SLINGSHOT [Forest]</option>
    <option value="9">Wave 9 - CROSSBOW [Forest]</option>
    <option value="10">Wave 10 - BEAR TRAP (BOSS) [Forest]</option>
  </select>
</div>
<div id="health-container">
  <div id="health-label">HP</div>
  <div id="health-bar">
    <div id="health-fill"></div>
    <div id="health-segments">
      <div class="health-segment"></div>
      <div class="health-segment"></div>
      <div class="health-segment bonus" id="bonus-segment" style="display:none;"></div>
    </div>
  </div>
</div>
<div id="damage-flash"></div>
<div id="wave-announce"></div>
<div id="game-over">
  <h1>GAME OVER</h1>
  <div class="final-score">Score: 0</div>
  <div class="restart" onclick="restartGame()">Click to restart</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
